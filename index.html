<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#080508">
<title>BRUTALIZE</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<style>
*{box-sizing:border-box;user-select:none;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;background:#060304;touch-action:none;}
body{font-family:'Rajdhani',sans-serif;display:flex;flex-direction:column;}

#topbar{
  flex-shrink:0;height:52px;
  display:flex;align-items:center;gap:6px;
  background:linear-gradient(180deg,#18080f,#0d040a);
  border-bottom:1.5px solid #2a0810;
  padding:0 10px;z-index:50;
}
#topbar h1{font-family:'Bebas Neue';font-size:26px;color:#cc0022;letter-spacing:4px;
  text-shadow:0 0 14px rgba(200,0,34,.9);flex-shrink:0;}
.srow{display:flex;flex:1;justify-content:center;}
.sbox{text-align:center;padding:0 8px;border-right:1px solid #2a0810;}
.sbox:last-child{border:none;}
.sv{font-family:'Bebas Neue';font-size:19px;color:#cc0022;line-height:1;}
.sl{font-size:7px;color:#552233;letter-spacing:2px;text-transform:uppercase;}
#menubtn{flex-shrink:0;width:36px;height:36px;background:#120608;border:1.5px solid #2a0810;
  border-radius:9px;display:flex;align-items:center;justify-content:center;
  color:#cc4455;font-size:18px;cursor:pointer;}
#menubtn:active{transform:scale(.86);}

#gw{flex:1;position:relative;overflow:hidden;min-height:0;}
canvas{position:absolute;top:0;left:0;pointer-events:none;}
#bg-c{z-index:1;}#gc{z-index:2;}#bl-c{z-index:3;}#ov{z-index:4;}
#tl{position:absolute;inset:0;z-index:5;touch-action:none;}
#hf{position:absolute;inset:0;opacity:0;pointer-events:none;z-index:6;
  background:radial-gradient(ellipse at 50% 40%,rgba(200,0,0,.5),transparent 70%);
  transition:opacity .06s;}
#vign{position:absolute;inset:0;pointer-events:none;z-index:7;
  background:radial-gradient(ellipse at 50% 40%,transparent 18%,rgba(0,0,0,.86) 100%);}
#cbo{position:absolute;top:8px;left:50%;transform:translateX(-50%);
  text-align:center;pointer-events:none;z-index:8;opacity:0;transition:opacity .3s;}
#cbo .cl{font-size:9px;color:#d4a017;letter-spacing:4px;font-weight:700;text-transform:uppercase;}
#cbo .cv{font-family:'Bebas Neue';font-size:50px;color:#cc0022;line-height:1;
  text-shadow:0 0 18px rgba(200,0,34,.9);}

#mpill{position:absolute;bottom:8px;right:6px;z-index:9;display:flex;flex-direction:column;gap:4px;}
.mpb{width:38px;height:38px;border-radius:11px;border:1.5px solid #2a0810;
  background:#0d0608;color:#773344;font-size:17px;
  display:flex;align-items:center;justify-content:center;cursor:pointer;}
.mpb.on{background:#220008;border-color:#8b0000;color:#cc0022;box-shadow:0 0 10px rgba(200,0,34,.35);}
.mpb:active{transform:scale(.83);}

#bot{flex-shrink:0;background:linear-gradient(0deg,#0a040a,#110608);border-top:1.5px solid #2a0810;z-index:50;}
#cats{display:flex;gap:4px;padding:6px 8px 3px;overflow-x:auto;scrollbar-width:none;}
#cats::-webkit-scrollbar{display:none;}
.cat{flex-shrink:0;font-family:'Bebas Neue';font-size:12px;letter-spacing:2px;
  padding:5px 13px;border-radius:20px;border:1px solid #2a0810;color:#773344;cursor:pointer;}
.cat.on{background:#220008;border-color:#8b0000;color:#cc0022;}
.cat:active{transform:scale(.9);}
#tray{display:flex;gap:6px;padding:3px 8px 10px;overflow-x:auto;scrollbar-width:none;}
#tray::-webkit-scrollbar{display:none;}
.wb{flex-shrink:0;width:64px;background:#0d0608;border:1px solid #1e0a10;border-radius:9px;
  color:#aa6670;font-family:'Rajdhani';font-size:10px;font-weight:700;
  padding:7px 4px 5px;cursor:pointer;text-align:center;text-transform:uppercase;}
.wb .ic{font-size:20px;display:block;margin-bottom:2px;}
.wb:active{background:#1a0810;border-color:#8b0000;color:#cc0022;transform:scale(.85);}
.wb.gold{border-color:#2a1c00;color:#886622;}
.wb.gold:active{border-color:#d4a017;color:#d4a017;background:#1a1000;}

#sho{position:fixed;inset:0;z-index:200;display:none;flex-direction:column;justify-content:flex-end;}
#sho.on{display:flex;}
#shbg{position:absolute;inset:0;background:rgba(0,0,0,.72);}
#sh{position:relative;background:#0d0810;border-radius:20px 20px 0 0;
  border-top:2px solid #8b0000;max-height:78vh;overflow-y:auto;padding-bottom:20px;}
.shh{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 10px;}
.shh h2{font-family:'Bebas Neue';font-size:21px;color:#cc0022;letter-spacing:3px;}
.shh button{background:none;border:none;color:#882233;font-size:23px;cursor:pointer;padding:4px;}
.msec{padding:5px 16px 2px;font-size:9px;letter-spacing:3px;color:#441a22;
  text-transform:uppercase;border-top:1px solid #180610;margin-top:4px;}
.mr{display:flex;align-items:center;gap:10px;padding:5px 14px;}
.mr label{font-size:11px;color:#664455;letter-spacing:1px;text-transform:uppercase;width:54px;min-width:54px;}
.mr input[type=color]{width:36px;height:26px;border:1px solid #2a1018;border-radius:4px;background:none;cursor:pointer;padding:1px;}
.mr input[type=range]{flex:1;accent-color:#cc0022;height:4px;}
.mr select{flex:1;background:#0d0608;border:1px solid #1e0a10;color:#aa7788;font-family:'Rajdhani';font-size:11px;padding:4px 6px;border-radius:4px;}
.mr input[type=file]{display:none;}
.mr input[type=text]{flex:1;background:#0d0608;border:1px solid #1e0a10;color:#cc8899;font-family:'Rajdhani';font-size:12px;padding:4px 6px;border-radius:4px;outline:none;}
.fib{flex:1;background:#0d0608;border:1px solid #1e0a10;border-radius:4px;color:#aa7788;font-family:'Rajdhani';font-size:11px;font-weight:700;padding:5px 8px;cursor:pointer;text-align:center;}
.fib:active{border-color:#8b0000;color:#cc0022;}
.mg{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:6px 12px;}
.mwb{background:#0d0608;border:1px solid #1e0a10;border-radius:8px;color:#aa6670;font-family:'Rajdhani';font-size:11px;font-weight:700;padding:9px 6px 7px;cursor:pointer;text-align:center;text-transform:uppercase;}
.mwb .ic{font-size:19px;display:block;margin-bottom:2px;}
.mwb:active{background:#1a0810;border-color:#8b0000;color:#cc0022;transform:scale(.9);}

#ds{position:absolute;inset:0;z-index:900;display:none;flex-direction:column;align-items:center;justify-content:center;}
#ds.on{display:flex;}
#dsbg{position:absolute;inset:0;background:rgba(0,0,0,.97);}
#dsglow{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 35%,rgba(130,0,0,.72),transparent 65%);}
#dsdrips{position:absolute;top:0;left:0;width:100%;height:100%;overflow:hidden;pointer-events:none;}
.drip{position:absolute;top:0;border-radius:0 0 4px 4px;animation:dripA linear forwards;}
@keyframes dripA{0%{height:0;opacity:.9;}100%{height:68%;opacity:.08;}}
#dsc{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;padding:20px;text-align:center;}
#ds h2{font-family:'Bebas Neue';font-size:clamp(58px,18vw,100px);color:#cc0000;letter-spacing:8px;line-height:.9;
  text-shadow:0 0 40px #ff0000,0 0 80px rgba(255,0,0,.4);animation:dsG 1.2s ease-in-out infinite alternate;margin-bottom:8px;}
.dssub{font-size:11px;color:#882222;letter-spacing:5px;text-transform:uppercase;margin-bottom:26px;}
.dsstats{display:flex;gap:28px;margin-bottom:34px;}
.dss .dsv{font-family:'Bebas Neue';font-size:clamp(32px,10vw,52px);color:#ff5555;line-height:1;}
.dss .dsl{font-size:9px;color:#662222;letter-spacing:3px;text-transform:uppercase;}
#ds button{font-family:'Bebas Neue';font-size:19px;letter-spacing:4px;
  background:linear-gradient(135deg,#220008,#440010);border:2px solid #cc0022;
  color:#ff5555;padding:14px 40px;cursor:pointer;border-radius:10px;}
#ds button:active{transform:scale(.91);}
@keyframes dsG{from{text-shadow:0 0 20px #ff0000;}to{text-shadow:0 0 55px #ff0000,0 0 90px rgba(255,0,0,.6);}}
@keyframes shk{0%,100%{transform:translate(0,0);}20%{transform:translate(-6px,4px);}40%{transform:translate(7px,-5px);}60%{transform:translate(-4px,4px);}80%{transform:translate(5px,-3px);}}
.shk{animation:shk .22s ease both;}
</style>
</head>
<body>

<div id="topbar">
  <h1>BRUTALIZE</h1>
  <div class="srow">
    <div class="sbox"><div class="sv" id="s-hits">0</div><div class="sl">Hits</div></div>
    <div class="sbox"><div class="sv" id="s-dmg">0</div><div class="sl">Dano</div></div>
    <div class="sbox"><div class="sv" id="s-cbo">x1</div><div class="sl">Combo</div></div>
    <div class="sbox"><div class="sv" id="s-kil">0</div><div class="sl">Kills</div></div>
  </div>
  <div id="menubtn" onclick="openSheet()">☰</div>
</div>

<div id="gw">
  <canvas id="bg-c"></canvas>
  <canvas id="gc"></canvas>
  <canvas id="bl-c"></canvas>
  <canvas id="ov"></canvas>
  <div id="tl"></div>
  <div id="hf"></div>
  <div id="vign"></div>
  <div id="cbo"><div class="cl">COMBO</div><div class="cv" id="cv">x1</div></div>
  <div id="mpill">
    <div class="mpb on" id="mp-drag" onclick="setMode('drag')">✋</div>
    <div class="mpb"    id="mp-rep"  onclick="setMode('rep')">💥</div>
    <div class="mpb"    id="mp-mag"  onclick="setMode('mag')">🧲</div>
    <div class="mpb"    id="mp-sli"  onclick="setMode('sli')">🗡</div>
  </div>
  <div id="ds">
    <div id="dsbg"></div><div id="dsglow"></div><div id="dsdrips"></div>
    <div id="dsc">
      <h2>FATALITY</h2>
      <div class="dssub">inimigo eliminado</div>
      <div class="dsstats">
        <div class="dss"><div class="dsv" id="d-hits">0</div><div class="dsl">Hits</div></div>
        <div class="dss"><div class="dsv" id="d-dmg">0</div><div class="dsl">Dano</div></div>
        <div class="dss"><div class="dsv" id="d-kills">0</div><div class="dsl">Kills</div></div>
      </div>
      <button onclick="respawn()">🔄 NOVO INIMIGO</button>
    </div>
  </div>
</div>

<div id="bot">
  <div id="cats">
    <div class="cat on" onclick="showCat('weapons')">⚔ Arsenal</div>
    <div class="cat"    onclick="showCat('powers')">🌀 Poderes</div>
    <div class="cat"    onclick="showCat('tools')">🛠 Ferramentas</div>
  </div>
  <div id="tray"></div>
</div>

<div id="sho" onclick="shBg(event)">
  <div id="shbg"></div>
  <div id="sh">
    <div class="shh"><h2>⚙ Configurar</h2><button onclick="closeSheet()">✕</button></div>
    <div class="msec">🎨 Aparência</div>
    <div class="mr"><label>Pele</label>
      <input type="color" id="c-skin" value="#d4a882" oninput="applyC()">
      <input type="range" id="c-tone" min="0" max="100" value="50" oninput="applyC()">
    </div>
    <div class="mr"><label>Camisa</label><input type="color" id="c-shirt" value="#2255aa" oninput="applyC()"></div>
    <div class="mr"><label>Calça</label><input type="color" id="c-pants" value="#223344" oninput="applyC()"></div>
    <div class="mr"><label>Cabelo</label>
      <input type="color" id="c-hair" value="#1a0a00" oninput="applyC()">
      <select id="c-hs" onchange="applyC()">
        <option value="short">Curto</option><option value="long">Longo</option>
        <option value="mohawk">Moicano</option><option value="bald">Careca</option>
      </select>
    </div>
    <div class="mr"><label>Foto</label>
      <label class="fib">📷 Face<input type="file" id="c-face" accept="image/*" onchange="loadFace(event)"></label>
      <button class="fib" onclick="clearFace()" style="margin-left:6px">✕</button>
    </div>
    <div class="mr"><label>Tam.</label><input type="range" id="c-size" min="70" max="140" value="100" oninput="scheduleRebuild()"></div>
    <div class="mr"><label>Nome</label><input type="text" id="c-name" placeholder="Inimigo..." maxlength="14" oninput="applyC()"></div>
    <div class="msec">🛠 Ações</div>
    <div class="mg">
      <button class="mwb" onclick="clearItems()"><span class="ic">🧹</span>Limpar</button>
      <button class="mwb" onclick="clearBlood()"><span class="ic">🩸</span>Sangue</button>
    </div>
  </div>
</div>

<script>
'use strict';
// ─────────────────────────────────────────────
//  GLOBALS (set once in init)
// ─────────────────────────────────────────────
let GW = 0, GH = 0, FLOOR = 0;
let engine, world, runner;
let bgX, gcX, blX, ovX;
let mcRef = null;

// ─────────────────────────────────────────────
//  ENTRY POINT — wait for layout to stabilise
// ─────────────────────────────────────────────
window.addEventListener('load', () => {
  // Use a short timeout so the browser finishes flex layout before we measure
  setTimeout(startGame, 80);
});

function startGame() {
  const gw = document.getElementById('gw');
  GW = gw.clientWidth  || window.innerWidth;
  GH = gw.clientHeight || (window.innerHeight - 52 - 96); // fallback
  FLOOR = GH * 0.74;

  // Size all canvases
  ['bg-c','gc','bl-c','ov'].forEach(id => {
    const c = document.getElementById(id);
    c.width = GW; c.height = GH;
  });
  bgX = document.getElementById('bg-c').getContext('2d');
  gcX = document.getElementById('gc').getContext('2d');
  blX = document.getElementById('bl-c').getContext('2d');
  ovX = document.getElementById('ov').getContext('2d');

  // Physics engine
  engine = Engine.create({ positionIterations:10, velocityIterations:8 });
  world  = engine.world;
  engine.gravity.y = 2.0;

  // Static walls — MUST be created before runner starts
  const W = { isStatic:true, friction:.9, restitution:.1, render:{visible:false}, label:'wall' };
  Composite.add(world, [
    Bodies.rectangle(GW/2, GH + 50,  GW + 400, 100, W),  // floor
    Bodies.rectangle(GW/2, -50,       GW + 400, 100, W),  // ceiling
    Bodies.rectangle(-50,  GH/2,      100, GH + 400, W),  // left
    Bodies.rectangle(GW+50, GH/2,     100, GH + 400, W),  // right
  ]);

  // Mouse drag
  setupDrag();

  // Draw static background
  drawBG();

  // Build character
  buildDummy();

  // Collision events
  setupCollisions();

  // Start physics + render loop
  runner = Runner.create();
  Runner.run(runner, engine);
  requestAnimationFrame(gameLoop);

  // Tray
  showCat('weapons');
}

// ─────────────────────────────────────────────
//  MATTER aliases
// ─────────────────────────────────────────────
const { Engine, Runner, Bodies, Body, Composite, Constraint, Mouse, MouseConstraint, Events } = Matter;

// ─────────────────────────────────────────────
//  CUSTOMISATION
// ─────────────────────────────────────────────
let C = { skin:'#d4a882', tone:50, shirt:'#2255aa', pants:'#223344',
          hair:'#1a0a00', hs:'short', face:null, name:'', size:100 };

function applyC() {
  C.skin  = document.getElementById('c-skin').value;
  C.tone  = +document.getElementById('c-tone').value;
  C.shirt = document.getElementById('c-shirt').value;
  C.pants = document.getElementById('c-pants').value;
  C.hair  = document.getElementById('c-hair').value;
  C.hs    = document.getElementById('c-hs').value;
  C.name  = document.getElementById('c-name').value;
}
function loadFace(e) {
  if (!e.target.files[0]) return;
  const img = new Image();
  img.onload = () => C.face = img;
  img.src = URL.createObjectURL(e.target.files[0]);
}
function clearFace() { C.face = null; document.getElementById('c-face').value = ''; }

let rebuildTimer = 0;
function scheduleRebuild() {
  clearTimeout(rebuildTimer);
  rebuildTimer = setTimeout(buildDummy, 120);
}

// ─────────────────────────────────────────────
//  COLOUR UTILS
// ─────────────────────────────────────────────
const clamp = v => Math.max(0, Math.min(255, Math.round(v)));
const rgb   = (r,g,b) => `rgb(${clamp(r)},${clamp(g)},${clamp(b)})`;
function pRGB(c) {
  if (!c) return [128,128,128];
  if (c[0] === '#') { const h=c.slice(1); return [parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)]; }
  const m = c.match(/\d+/g); return m ? [+m[0],+m[1],+m[2]] : [128,128,128];
}
const lighten = (c,a) => { const[r,g,b]=pRGB(c); return rgb(r+255*a,g+255*a,b+255*a); };
const darken  = (c,a) => { const[r,g,b]=pRGB(c); return rgb(r-255*a,g-255*a,b-255*a); };
function injCol(c,inj) { const[r,g,b]=pRGB(c); const t=Math.min(inj/480,1); return rgb(r+(80-r)*t,g*(1-t*.9),b*(1-t*.9)); }
function skinV(d=0) { const[r,g,b]=pRGB(C.skin); const t=(C.tone-50)/50; return rgb(r+t*36+d,g+t*22+d,b+t*12+d); }

// ─────────────────────────────────────────────
//  SEEDED BLOOD
// ─────────────────────────────────────────────
const BS = {};
function bSeed(l) { if (!BS[l]) BS[l] = Math.random()*9999|0; return BS[l]; }
function sr(s,i)  { const x = Math.sin(s + i*1.618)*10000; return x - Math.floor(x); }
function newSeed(l) { BS[l] = Math.random()*9999|0; }

// ─────────────────────────────────────────────
//  DUMMY STATE
// ─────────────────────────────────────────────
const D = {
  mode: 'stand', dead: false,
  inj: {},
  sc: 1,
  shake: { x:0, y:0, vx:0, vy:0 },
  eyeX: 0, eyeY: 0,
  parts: [], joints: [], headBody: null
};
let standBox = null;

function getInj(l)  { return D.inj[l] || 0; }
function addInj(l,v){ D.inj[l] = (D.inj[l]||0) + v; newSeed(l); }
function totalInj() { return Object.values(D.inj).reduce((a,b)=>a+b, 0); }

// ─────────────────────────────────────────────
//  BUILD / REBUILD DUMMY
// ─────────────────────────────────────────────
function buildDummy() {
  if (!engine) return; // not yet initialised

  // remove old bodies
  D.parts.forEach(p  => { try { Composite.remove(world, p); } catch(e){} });
  D.joints.forEach(j => { try { Composite.remove(world, j); } catch(e){} });
  if (standBox) { try { Composite.remove(world, standBox); } catch(e){} standBox = null; }
  D.parts = []; D.joints = [];
  D.inj = {}; D.dead = false;
  D.shake = { x:0, y:0, vx:0, vy:0 };
  D.eyeX = 0; D.eyeY = 0;
  Object.keys(BS).forEach(k => delete BS[k]);

  C.size = +(document.getElementById('c-size')?.value || 100);
  const sc = C.size / 100;
  D.sc   = sc;
  D.mode = 'stand';

  // Hitbox covers the whole standing character
  // Character total height ≈ 280 * sc pixels, feet at FLOOR
  const charH = 280 * sc;
  const boxY  = FLOOR - charH / 2;
  standBox = Bodies.rectangle(GW/2, boxY, 72*sc, charH, {
    isStatic: true, label: 'standBox', render: { visible: false }
  });
  Composite.add(world, standBox);
}

// ─────────────────────────────────────────────
//  SWITCH TO RAGDOLL
// ─────────────────────────────────────────────
function switchToRagdoll() {
  if (D.mode === 'ragdoll') return;
  D.mode = 'ragdoll';
  if (standBox) { try { Composite.remove(world, standBox); } catch(e){} standBox = null; }

  const sc = D.sc, cx = GW/2;
  const s  = sc;

  // Heights of each segment
  const ftH=14*s, llH=38*s, luH=42*s, pvH=22*s, tlH=36*s, tuH=48*s, nkH=16*s, hdR=22*s;

  // Absolute Y positions in Matter coords (0 = top, FLOOR = floor)
  const ftY = FLOOR - ftH/2;
  const llY = FLOOR - ftH - llH/2;
  const luY = FLOOR - ftH - llH - luH/2;
  const pvY = FLOOR - ftH - llH - luH - pvH/2;
  const tlY = FLOOR - ftH - llH - luH - pvH - tlH/2;
  const tuY = FLOOR - ftH - llH - luH - pvH - tlH - tuH/2;
  const nkY = FLOOR - ftH - llH - luH - pvH - tlH - tuH - nkH/2;
  const hdY = FLOOR - ftH - llH - luH - pvH - tlH - tuH - nkH - hdR;
  const armX = 36*s;
  const sY   = tuY - tuH/2 + 4*s; // shoulder origin

  const grp = Body.nextGroup(true);
  const cf  = { group: grp };

  const mk = (l,x,y,w,h) => Bodies.rectangle(x, y, w*s, h*s, {
    collisionFilter:cf, label:l, restitution:.2, friction:.7, density:.003,
    chamfer:{ radius: Math.min(w,h)*s*.32 }, render:{visible:false}
  });
  const mc = (l,x,y,r) => Bodies.circle(x, y, r*s, {
    collisionFilter:cf, label:l, restitution:.22, friction:.65, density:.0032, render:{visible:false}
  });

  const hd  = mc('head',   cx,     hdY, 22);
  const nk  = mk('neck',   cx,     nkY, 12, 16);
  const tu  = mk('torsoU', cx,     tuY, 42, 48);
  const tl2 = mk('torsoL', cx,     tlY, 38, 36);
  const pv  = mk('pelvis', cx,     pvY, 34, 22);
  const aUL = mk('armUL',  cx-armX, sY+14*s, 15, 36);
  const aLL = mk('armLL',  cx-armX, sY+50*s, 11, 32);
  const hnL = mc('handL',  cx-armX, sY+74*s, 9);
  const aUR = mk('armUR',  cx+armX, sY+14*s, 15, 36);
  const aLR = mk('armLR',  cx+armX, sY+50*s, 11, 32);
  const hnR = mc('handR',  cx+armX, sY+74*s, 9);
  const lUL = mk('legUL',  cx-14*s, luY, 18, 42);
  const lLL = mk('legLL',  cx-14*s, llY, 14, 38);
  const ftL = mk('footL',  cx-14*s, ftY, 24, 14);
  const lUR = mk('legUR',  cx+14*s, luY, 18, 42);
  const lLR = mk('legLR',  cx+14*s, llY, 14, 38);
  const ftR = mk('footR',  cx+14*s, ftY, 24, 14);

  const parts = [hd,nk,tu,tl2,pv,aUL,aLL,hnL,aUR,aLR,hnR,lUL,lLL,ftL,lUR,lLR,ftR];

  const JR = { stiffness:.95, damping:.3,  length:0, render:{visible:false} };
  const JF = { stiffness:.7,  damping:.18, length:0, render:{visible:false} };
  const JL = { stiffness:.5,  damping:.12, length:0, render:{visible:false} };

  const joints = [
    Constraint.create({ bodyA:hd,  pointA:{x:0,y:22*s},  bodyB:nk,  pointB:{x:0,y:-8*s},  ...JR }),
    Constraint.create({ bodyA:nk,  pointA:{x:0,y:8*s},   bodyB:tu,  pointB:{x:0,y:-24*s}, ...JR }),
    Constraint.create({ bodyA:tu,  pointA:{x:0,y:24*s},  bodyB:tl2, pointB:{x:0,y:-18*s}, ...JR }),
    Constraint.create({ bodyA:tl2, pointA:{x:0,y:18*s},  bodyB:pv,  pointB:{x:0,y:-11*s}, ...JR }),
    Constraint.create({ bodyA:tu,  pointA:{x:-21*s,y:-20*s}, bodyB:aUL, pointB:{x:0,y:-18*s}, ...JF }),
    Constraint.create({ bodyA:aUL, pointA:{x:0,y:18*s},  bodyB:aLL, pointB:{x:0,y:-16*s}, ...JL }),
    Constraint.create({ bodyA:aLL, pointA:{x:0,y:16*s},  bodyB:hnL, pointB:{x:0,y:-9*s},  ...JL }),
    Constraint.create({ bodyA:tu,  pointA:{x:21*s,y:-20*s},  bodyB:aUR, pointB:{x:0,y:-18*s}, ...JF }),
    Constraint.create({ bodyA:aUR, pointA:{x:0,y:18*s},  bodyB:aLR, pointB:{x:0,y:-16*s}, ...JL }),
    Constraint.create({ bodyA:aLR, pointA:{x:0,y:16*s},  bodyB:hnR, pointB:{x:0,y:-9*s},  ...JL }),
    Constraint.create({ bodyA:pv,  pointA:{x:-10*s,y:11*s}, bodyB:lUL, pointB:{x:0,y:-21*s}, ...JF }),
    Constraint.create({ bodyA:lUL, pointA:{x:0,y:21*s},  bodyB:lLL, pointB:{x:0,y:-19*s}, ...JL }),
    Constraint.create({ bodyA:lLL, pointA:{x:0,y:19*s},  bodyB:ftL, pointB:{x:0,y:-7*s},  ...JL }),
    Constraint.create({ bodyA:pv,  pointA:{x:10*s,y:11*s},  bodyB:lUR, pointB:{x:0,y:-21*s}, ...JF }),
    Constraint.create({ bodyA:lUR, pointA:{x:0,y:21*s},  bodyB:lLR, pointB:{x:0,y:-19*s}, ...JL }),
    Constraint.create({ bodyA:lLR, pointA:{x:0,y:19*s},  bodyB:ftR, pointB:{x:0,y:-7*s},  ...JL }),
  ];

  Composite.add(world, [...parts, ...joints]);

  // Launch force based on accumulated damage
  const force = Math.min(totalInj() / 1200, 0.28);
  parts.forEach(p => {
    Body.setVelocity(p, { x:(Math.random()-.5)*force*28, y:-force*16 });
  });

  D.parts = parts; D.joints = joints; D.headBody = hd;
}

// ─────────────────────────────────────────────
//  BACKGROUND
// ─────────────────────────────────────────────
function drawBG() {
  const x = bgX;
  // wall bricks
  const wg = x.createLinearGradient(0,0,0,FLOOR);
  wg.addColorStop(0,'#0e0810'); wg.addColorStop(1,'#140b10');
  x.fillStyle = wg; x.fillRect(0,0,GW,FLOOR);
  for (let row=0; row*22<FLOOR; row++) {
    const off = (row%2)*32;
    for (let col=-1; col<GW/64+2; col++) {
      const bx=col*64+off, by=row*22;
      x.strokeStyle='rgba(0,0,0,.55)'; x.lineWidth=1.5;
      x.strokeRect(bx+1,by+1,62,20);
      x.fillStyle=`rgba(${10+Math.random()*6|0},${5+Math.random()*3|0},${8+Math.random()*4|0},.6)`;
      x.fillRect(bx+2,by+2,60,18);
    }
  }
  // floor
  const fg = x.createLinearGradient(0,FLOOR,0,GH);
  fg.addColorStop(0,'#1a0c12'); fg.addColorStop(1,'#070304');
  x.fillStyle=fg; x.fillRect(0,FLOOR,GW,GH-FLOOR);
  x.fillStyle='#020102'; x.fillRect(0,FLOOR-4,GW,8);
  // chains
  [GW*.14, GW*.5, GW*.86].forEach(cx => {
    x.strokeStyle='rgba(25,8,14,.9)'; x.lineWidth=5;
    x.setLineDash([9,8]); x.beginPath(); x.moveTo(cx,0); x.lineTo(cx,70); x.stroke();
    x.setLineDash([]);
    x.fillStyle='#120608'; x.beginPath(); x.arc(cx,76,8,0,Math.PI*2); x.fill();
  });
  // spotlight
  const sp = x.createRadialGradient(GW/2,0,10,GW/2,GH*.4,GW*.7);
  sp.addColorStop(0,'rgba(80,15,28,.14)'); sp.addColorStop(1,'transparent');
  x.fillStyle=sp; x.fillRect(0,0,GW,GH);
}

// ─────────────────────────────────────────────
//  DRAW HELPERS
// ─────────────────────────────────────────────
function rr(ctx,x,y,w,h,r) {
  r = Math.min(r, w/2, h/2);
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}
function seg(ctx,col,cx,cy,w,h) {
  const rad = Math.min(w,h)*.34;
  const lg = ctx.createLinearGradient(cx-w/2,cy-h/2,cx+w/2,cy+h/2);
  lg.addColorStop(0, lighten(col,.16)); lg.addColorStop(.5,col); lg.addColorStop(1,darken(col,.32));
  ctx.fillStyle=lg; ctx.shadowColor='rgba(0,0,0,.7)'; ctx.shadowBlur=8; ctx.shadowOffsetY=2;
  rr(ctx, cx-w/2, cy-h/2, w, h, rad); ctx.fill(); ctx.shadowBlur=0;
}
function circ(ctx,col,cx,cy,r) {
  const g = ctx.createRadialGradient(cx-r*.2,cy-r*.2,r*.04,cx,cy,r);
  g.addColorStop(0,lighten(col,.2)); g.addColorStop(1,darken(col,.28));
  ctx.fillStyle=g; ctx.shadowColor='rgba(0,0,0,.7)'; ctx.shadowBlur=7;
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0;
}

// ─────────────────────────────────────────────
//  DRAW STANDING CHARACTER
// ─────────────────────────────────────────────
function drawStanding(ctx) {
  const sc = D.sc, s = sc;
  // Base: feet anchored at FLOOR
  const base = FLOOR + D.shake.y;
  const cx   = GW/2 + D.shake.x;

  const ftH=14*s, llH=38*s, luH=42*s, pvH=22*s, tlH=36*s, tuH=48*s, nkH=16*s, hdR=22*s;

  // Absolute Y for each segment centre
  const ftY = base - ftH/2;
  const llY = base - ftH - llH/2;
  const luY = base - ftH - llH - luH/2;
  const pvY = base - ftH - llH - luH - pvH/2;
  const tlY = base - ftH - llH - luH - pvH - tlH/2;
  const tuY = base - ftH - llH - luH - pvH - tlH - tuH/2;
  const nkY = base - ftH - llH - luH - pvH - tlH - tuH - nkH/2;
  const hdY = base - ftH - llH - luH - pvH - tlH - tuH - nkH - hdR;
  const armX  = 38*s;
  const shldrY = tuY - tuH*.34;

  const iv = l => getInj(l);

  // --- shoes ---
  ctx.fillStyle = darken(C.pants,.14);
  rr(ctx, cx-27*s, ftY-ftH*.58, 22*s, ftH*.28, 3*s); ctx.fill();
  rr(ctx, cx+5*s,  ftY-ftH*.58, 22*s, ftH*.28, 3*s); ctx.fill();

  // --- legs ---
  seg(ctx, injCol(C.pants,iv('footL')), cx-14*s, ftY, 24*s, ftH);
  seg(ctx, injCol(C.pants,iv('footR')), cx+14*s, ftY, 24*s, ftH);
  seg(ctx, injCol(C.pants,iv('legLL')), cx-14*s, llY, 14*s, llH);
  seg(ctx, injCol(C.pants,iv('legLR')), cx+14*s, llY, 14*s, llH);
  seg(ctx, injCol(C.pants,iv('legUL')), cx-14*s, luY, 18*s, luH);
  seg(ctx, injCol(C.pants,iv('legUR')), cx+14*s, luY, 18*s, luH);

  // --- torso ---
  seg(ctx, injCol(C.pants,iv('pelvis')), cx, pvY, 34*s, pvH);
  seg(ctx, injCol(C.shirt,iv('torsoL')), cx, tlY, 38*s, tlH);
  seg(ctx, injCol(C.shirt,iv('torsoU')), cx, tuY, 42*s, tuH);

  // shirt detail
  ctx.strokeStyle=darken(C.shirt,.22); ctx.lineWidth=2*s; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(cx-8*s,tuY-tuH*.44); ctx.lineTo(cx,tuY-tuH*.28); ctx.lineTo(cx+8*s,tuY-tuH*.44); ctx.stroke();
  ctx.fillStyle=lighten(C.shirt,.3);
  for(let i=0;i<3;i++){ctx.beginPath();ctx.arc(cx,tuY-tuH*.16+i*tuH*.2,2.2*s,0,Math.PI*2);ctx.fill();}

  // shirt rips
  if(iv('torsoU')>90){
    const ss=bSeed('torsoU'); ctx.strokeStyle=darken(C.shirt,.38); ctx.lineWidth=1.2*s;
    for(let t=0;t<Math.min(iv('torsoU')/55|0,6);t++){
      ctx.beginPath();
      ctx.moveTo(cx+(sr(ss,t*4)-.5)*36*s, tuY+(sr(ss,t*4+1)-.5)*tuH*.8);
      ctx.lineTo(cx+(sr(ss,t*4+2)-.5)*36*s, tuY+(sr(ss,t*4+3)-.5)*tuH*.8);
      ctx.stroke();
    }
  }

  // --- arms ---
  seg(ctx, injCol(C.shirt,iv('armUL')), cx-armX, shldrY+12*s, 15*s, 36*s);
  seg(ctx, injCol(C.shirt,iv('armUR')), cx+armX, shldrY+12*s, 15*s, 36*s);
  seg(ctx, injCol(skinV(),iv('armLL')), cx-armX, shldrY+38*s, 11*s, 32*s);
  seg(ctx, injCol(skinV(),iv('armLR')), cx+armX, shldrY+38*s, 11*s, 32*s);
  circ(ctx, injCol(skinV(),iv('handL')), cx-armX, shldrY+58*s, 9*s);
  circ(ctx, injCol(skinV(),iv('handR')), cx+armX, shldrY+58*s, 9*s);

  // --- neck ---
  seg(ctx, injCol(skinV(-5),iv('neck')), cx, nkY, 12*s, nkH);
  if(iv('neck')>180){
    const ga=Math.min((iv('neck')-180)/280,.9);
    ctx.strokeStyle=`rgba(145,0,0,${ga})`; ctx.lineWidth=3*s+ga*4*s; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(cx-8*s,nkY+2*s); ctx.lineTo(cx,nkY+5*s); ctx.lineTo(cx+7*s,nkY+2*s); ctx.stroke();
  }

  // --- head ---
  drawHead(ctx, cx, hdY, hdR, iv('head'), D.eyeX, D.eyeY, iv('head')>120);

  // --- bone gore on limbs ---
  [
    ['armUL',cx-armX,shldrY+12*s,15*s,36*s], ['armUR',cx+armX,shldrY+12*s,15*s,36*s],
    ['armLL',cx-armX,shldrY+38*s,11*s,32*s], ['armLR',cx+armX,shldrY+38*s,11*s,32*s],
    ['legUL',cx-14*s,luY,18*s,luH], ['legUR',cx+14*s,luY,18*s,luH],
    ['legLL',cx-14*s,llY,14*s,llH], ['legLR',cx+14*s,llY,14*s,llH],
  ].forEach(([l,x,y,w,h]) => {
    const inj2=getInj(l); if(inj2<160) return;
    const ba=Math.min((inj2-160)/360,.8);
    ctx.fillStyle=`rgba(145,18,18,${ba*.62})`;
    ctx.beginPath(); ctx.ellipse(x,y,w*.42,h*.14,0,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle=`rgba(232,218,198,${ba})`; ctx.lineWidth=Math.max(w*.15,2);
    ctx.setLineDash([h*.1,h*.08]);
    ctx.beginPath(); ctx.moveTo(x,y-h*.44); ctx.lineTo(x,y+h*.44); ctx.stroke();
    ctx.setLineDash([]);
    const ss=bSeed(l);
    for(let i=0;i<Math.min(inj2/16|0,10);i++){
      ctx.fillStyle=`rgba(${105+sr(ss,i+200)*55|0},0,0,${.25+sr(ss,i+300)*.6})`;
      ctx.beginPath();
      ctx.ellipse(x+(sr(ss,i*4)-.5)*w*.78,y+(sr(ss,i*4+1)-.5)*h*.78,
        sr(ss,i*4+2)*w*.18+w*.04, sr(ss,i*4+3)*w*.09+w*.03, sr(ss,i+400)*Math.PI, 0, Math.PI*2);
      ctx.fill();
    }
  });

  // name tag
  if(C.name){
    ctx.font=`bold ${14*s}px Rajdhani`; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.strokeStyle='rgba(0,0,0,.95)'; ctx.lineWidth=3.5;
    ctx.strokeText(C.name, cx, hdY-hdR-13*s);
    ctx.fillStyle='rgba(255,255,255,.9)';
    ctx.fillText(C.name, cx, hdY-hdR-13*s);
  }
}

// ─────────────────────────────────────────────
//  DRAW HEAD
// ─────────────────────────────────────────────
function drawHead(ctx,x,y,r,inj,evx,evy,ko) {
  const skinC = injCol(skinV(), inj);
  ctx.shadowColor='rgba(0,0,0,.85)'; ctx.shadowBlur=14; ctx.shadowOffsetY=3;

  if(inj>450) {
    ctx.fillStyle='#e8dcc8'; ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0;
    ctx.strokeStyle='rgba(0,0,0,.4)'; ctx.lineWidth=1.3;
    for(let i=0;i<5;i++){const a=i*1.25;ctx.beginPath();ctx.moveTo(x+Math.cos(a)*r*.1,y+Math.sin(a)*r*.1);for(let k=1;k<=4;k++)ctx.lineTo(x+Math.cos(a+.38*k)*r*(.1+k*.2),y+Math.sin(a+.38*k)*r*(.1+k*.2));ctx.stroke();}
    ctx.fillStyle='#05000a';
    ctx.beginPath();ctx.ellipse(x-r*.33,y-r*.14,r*.21,r*.26,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(x+r*.33,y-r*.14,r*.21,r*.26,0,0,Math.PI*2);ctx.fill();
    const bf=Math.min((inj-450)/280,1);
    if(bf>0){ctx.fillStyle=`rgba(150,15,25,${bf*.88})`;ctx.beginPath();ctx.ellipse(x,y-r*.28,r*.52*bf,r*.27*bf,0,0,Math.PI*2);ctx.fill();}
    ctx.fillStyle='#dfd3b5';
    for(let t=-3;t<=3;t++)ctx.fillRect(x+t*r*.12-r*.04,y+r*.28,r*.09,r*.26);
    return;
  }

  const hg = ctx.createRadialGradient(x-r*.2,y-r*.2,r*.05,x,y,r);
  hg.addColorStop(0,lighten(skinC,.25)); hg.addColorStop(.6,skinC); hg.addColorStop(1,darken(skinC,.32));
  ctx.fillStyle=hg; ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0;

  if(C.face){
    ctx.save(); ctx.beginPath(); ctx.arc(x,y,r-.5,0,Math.PI*2); ctx.clip();
    ctx.drawImage(C.face,x-r,y-r,r*2,r*2); ctx.restore();
  } else {
    // hair
    if(C.hs!=='bald'){
      ctx.fillStyle=C.hair; ctx.shadowColor='rgba(0,0,0,.55)'; ctx.shadowBlur=4;
      if(C.hs==='short'){ctx.beginPath();ctx.arc(x,y-r*.06,r,Math.PI+.08,-0.08);ctx.fill();}
      else if(C.hs==='long'){ctx.beginPath();ctx.arc(x,y-r*.08,r*1.04,Math.PI+.15,-0.15);ctx.fill();ctx.fillRect(x-r*1.04,y-r*.07,r*.22,r*1.32);ctx.fillRect(x+r*.82,y-r*.07,r*.22,r*1.32);}
      else if(C.hs==='mohawk'){ctx.fillRect(x-r*.14,y-r*1.52,r*.28,r*1.15);}
      ctx.shadowBlur=0;
    }
    // eyebrows
    ctx.strokeStyle=darken(C.hair,.06); ctx.lineWidth=r*.09; ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(x-r*.54,y-r*.26);ctx.lineTo(x-r*.16,y-r*.16);ctx.stroke();
    ctx.beginPath();ctx.moveTo(x+r*.54,y-r*.26);ctx.lineTo(x+r*.16,y-r*.16);ctx.stroke();
    // eyes
    const ey=y-r*.08;
    if(!ko){
      ctx.fillStyle='#f0ece7';
      ctx.beginPath();ctx.ellipse(x-r*.35,ey,r*.175,r*.14,0,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.ellipse(x+r*.35,ey,r*.175,r*.14,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle=inj>160?'#7a1800':'#2255aa';
      ctx.beginPath();ctx.arc(x-r*.35+evx,ey+evy,r*.095,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(x+r*.35+evx,ey+evy,r*.095,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#000';
      ctx.beginPath();ctx.arc(x-r*.35+evx,ey+evy,r*.052,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(x+r*.35+evx,ey+evy,r*.052,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='rgba(255,255,255,.65)';
      ctx.beginPath();ctx.arc(x-r*.31+evx,ey-r*.04+evy,r*.028,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(x+r*.39+evx,ey-r*.04+evy,r*.028,0,Math.PI*2);ctx.fill();
    } else {
      ctx.strokeStyle='#bb0800'; ctx.lineWidth=r*.13; ctx.lineCap='round';
      ctx.beginPath();ctx.moveTo(x-r*.52,ey-r*.13);ctx.lineTo(x-r*.19,ey+r*.13);ctx.stroke();
      ctx.beginPath();ctx.moveTo(x-r*.19,ey-r*.13);ctx.lineTo(x-r*.52,ey+r*.13);ctx.stroke();
      ctx.beginPath();ctx.moveTo(x+r*.19,ey-r*.13);ctx.lineTo(x+r*.52,ey+r*.13);ctx.stroke();
      ctx.beginPath();ctx.moveTo(x+r*.52,ey-r*.13);ctx.lineTo(x+r*.19,ey+r*.13);ctx.stroke();
    }
    // mouth
    const hit = Math.hypot(D.shake.vx,D.shake.vy)>3;
    if(hit||inj>75){
      ctx.fillStyle='#0a0007'; ctx.beginPath(); ctx.ellipse(x,y+r*.52,r*.21,r*.16,0,0,Math.PI*2); ctx.fill();
    } else {
      ctx.strokeStyle=darken(skinC,.2); ctx.lineWidth=r*.082; ctx.lineCap='round';
      ctx.beginPath(); ctx.arc(x,y+r*.62,r*.18,Math.PI+.36,Math.PI*2-.36); ctx.stroke();
    }
    // nose
    ctx.strokeStyle=darken(skinC,.2); ctx.lineWidth=r*.082; ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(x-r*.08,y+r*.1);ctx.lineTo(x-r*.12,y+r*.25);ctx.lineTo(x,y+r*.28);ctx.lineTo(x+r*.12,y+r*.25);ctx.lineTo(x+r*.08,y+r*.1);ctx.stroke();
  }

  // ears
  ctx.fillStyle=skinV(-12); ctx.shadowColor='rgba(0,0,0,.4)'; ctx.shadowBlur=4;
  ctx.beginPath();ctx.ellipse(x-r,y+r*.04,r*.14,r*.22,-.2,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(x+r,y+r*.04,r*.14,r*.22,.2,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;

  // blood on face
  if(inj>45){
    ctx.save(); ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.clip();
    const ss=bSeed('head'), drops=Math.min(inj/15|0,18);
    for(let d=0;d<drops;d++){
      ctx.fillStyle=`rgba(135,0,0,${.3+sr(ss,d)*.6})`;
      ctx.beginPath();ctx.ellipse(x+(sr(ss,d*3)-.5)*r*1.75,y+(sr(ss,d*3+1)-.5)*r*1.75,
        sr(ss,d*3+2)*r*.16+r*.03,sr(ss,d*3+2)*r*.07+r*.02,sr(ss,d+100)*Math.PI,0,Math.PI*2);ctx.fill();
    }
    if(inj>110){
      const s2=bSeed('head_drip');
      for(let d=0;d<Math.min((inj-110)/55|0,6);d++){
        const dx=(sr(s2,d*2)-.5)*r*1.1, dl=sr(s2,d*2+1)*r*.7+r*.2;
        const g=ctx.createLinearGradient(x+dx,y-r*.5,x+dx,y-r*.5+dl);
        g.addColorStop(0,'rgba(165,0,0,.88)');g.addColorStop(1,'rgba(110,0,0,.05)');
        ctx.fillStyle=g; ctx.fillRect(x+dx-2,y-r*.5,4,dl);
      }
    }
    ctx.restore();
  }
}

// ─────────────────────────────────────────────
//  DRAW RAGDOLL PART
// ─────────────────────────────────────────────
function drawRagPart(ctx, p) {
  const lbl=p.label; if(!lbl||lbl==='wall') return;
  const inj=getInj(lbl);
  ctx.save(); ctx.translate(p.position.x,p.position.y); ctx.rotate(p.angle);
  const pw=p.bounds.max.x-p.bounds.min.x, ph=p.bounds.max.y-p.bounds.min.y;
  if(lbl==='head'){drawHead(ctx,0,0,pw/2,inj,0,0,inj>120);ctx.restore();return;}
  const base = lbl==='torsoU'||lbl==='torsoL' ? C.shirt
              : lbl==='pelvis'||lbl.startsWith('leg')||lbl.startsWith('foot') ? C.pants
              : skinV();
  const col=injCol(base,inj);
  ctx.shadowColor='rgba(0,0,0,.8)'; ctx.shadowBlur=9; ctx.shadowOffsetY=2;
  const lg=ctx.createLinearGradient(-pw/2,-ph/2,pw/2,ph/2);
  lg.addColorStop(0,lighten(col,.17)); lg.addColorStop(.5,col); lg.addColorStop(1,darken(col,.35));
  ctx.fillStyle=lg; rr(ctx,-pw/2,-ph/2,pw,ph,Math.min(pw,ph)*.4); ctx.fill(); ctx.shadowBlur=0;
  if(inj>160&&(lbl.startsWith('arm')||lbl.startsWith('leg'))){
    const ba=Math.min((inj-160)/360,.8);
    ctx.strokeStyle=`rgba(232,218,198,${ba})`; ctx.lineWidth=Math.max(pw*.14,2);
    ctx.setLineDash([ph*.1,ph*.08]);
    ctx.beginPath();ctx.moveTo(0,-ph*.44);ctx.lineTo(0,ph*.44);ctx.stroke();ctx.setLineDash([]);
  }
  if(inj>30){
    const ss=bSeed(lbl);
    for(let i=0;i<Math.min(inj/16|0,10);i++){
      ctx.fillStyle=`rgba(${105+sr(ss,i+200)*55|0},0,0,${.25+sr(ss,i+300)*.6})`;
      ctx.beginPath();ctx.ellipse((sr(ss,i*4)-.5)*pw*.75,(sr(ss,i*4+1)-.5)*ph*.75,
        sr(ss,i*4+2)*pw*.17+pw*.04,sr(ss,i*4+3)*pw*.09+pw*.03,sr(ss,i+400)*Math.PI,0,Math.PI*2);ctx.fill();
    }
  }
  ctx.restore();
}

// ─────────────────────────────────────────────
//  FX
// ─────────────────────────────────────────────
let particles=[], shockwaves=[], dmgTexts=[], fires=[];

function bloodSpray(x,y,n,force,angle){
  for(let i=0;i<Math.min(n,36);i++){
    const a=angle!==undefined?angle+(Math.random()-.5)*2.1:Math.random()*Math.PI*2;
    const spd=Math.random()*force+force*.15, sz=Math.random()*4+1.2;
    particles.push({x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,r:sz,col:`rgb(${110+Math.random()*45|0},0,0)`,a:.95,fade:.018+Math.random()*.014});
    if(Math.random()<.5) setTimeout(()=>{
      const bx2=x+Math.cos(a)*spd*(2.5+Math.random()*5), by2=y+Math.sin(a)*spd*(2.5+Math.random()*5);
      if(bx2>0&&bx2<GW&&by2>0&&by2<GH){
        blX.fillStyle=`rgba(${85+Math.random()*58|0},0,0,${.28+Math.random()*.44})`;
        blX.beginPath();blX.ellipse(bx2,by2,sz*(1.1+Math.random()),sz*(.5+Math.random()*.5),Math.random()*Math.PI,0,Math.PI*2);blX.fill();
      }
    }, 55+Math.random()*140);
  }
}
function bloodSplat(x,y,size){
  for(let i=0;i<10;i++){
    blX.fillStyle=`rgba(${82+Math.random()*62|0},0,0,${.2+Math.random()*.46})`;
    blX.beginPath();blX.ellipse(x+(Math.random()-.5)*size*3,y+(Math.random()-.5)*size,
      Math.random()*size*.9+size*.12,Math.random()*size*.5+size*.08,Math.random()*Math.PI,0,Math.PI*2);blX.fill();
  }
  if(y<GH*.9){
    const gr=blX.createLinearGradient(x,y,x,y+60);
    gr.addColorStop(0,'rgba(100,0,0,.5)');gr.addColorStop(1,'rgba(60,0,0,0)');
    blX.fillStyle=gr;blX.fillRect(x-1.5,y,3,60+Math.random()*50);
  }
}
function addSW(x,y,col='rgba(220,30,30,.9)'){shockwaves.push({x,y,r:6,a:.9,col});}
function shake(p=1){const w=document.getElementById('gw');w.classList.remove('shk');void w.offsetWidth;w.classList.add('shk');w.style.animationDuration=(0.1+p*.12)+'s';}
function hitFlash(){const f=document.getElementById('hf');f.style.opacity='1';setTimeout(()=>f.style.opacity='0',55);}

// ─────────────────────────────────────────────
//  STATS
// ─────────────────────────────────────────────
let hits=0, totalDmg=0, combo=1, comboT=0, kills=0;
function regHit(dmg){
  if(D.dead) return;
  hits++; totalDmg+=dmg|0; combo=Math.min(combo+1,99); comboT=130;
  document.getElementById('s-hits').textContent=hits;
  document.getElementById('s-dmg').textContent=totalDmg>9999?(totalDmg/1000).toFixed(1)+'k':totalDmg;
  document.getElementById('s-cbo').textContent='x'+combo;
  if(combo>=3){
    const el=document.getElementById('cbo');
    document.getElementById('cv').textContent='x'+combo;
    el.style.opacity='1'; setTimeout(()=>el.style.opacity='0',1600);
  }
}

// ─────────────────────────────────────────────
//  DEATH
// ─────────────────────────────────────────────
function triggerDeath(){
  if(D.dead) return; D.dead=true; kills++;
  document.getElementById('s-kil').textContent=kills;
  if(D.mode==='stand') switchToRagdoll();
  D.parts.forEach(p=>{bloodSpray(p.position.x,p.position.y,14,12);bloodSplat(p.position.x,p.position.y,18);Body.applyForce(p,p.position,{x:(Math.random()-.5)*.12,y:-.1});});
  shake(4); hitFlash();
  for(let i=0;i<36;i++) bloodSplat(Math.random()*GW,Math.random()*GH*.95,8+Math.random()*20);
  dmgTexts.push({txt:'FATALITY!',x:GW/2,y:GH*.25,a:1,vy:.7,sz:Math.min(GW*.13,78),col:'#cc0000'});
  setTimeout(()=>{
    document.getElementById('d-hits').textContent=hits;
    document.getElementById('d-dmg').textContent=totalDmg>9999?(totalDmg/1000).toFixed(1)+'k':totalDmg;
    document.getElementById('d-kills').textContent=kills;
    const dp=document.getElementById('dsdrips'); dp.innerHTML='';
    for(let i=0;i<20;i++){
      const dr=document.createElement('div'); dr.className='drip';
      dr.style.left=(Math.random()*100)+'%';
      dr.style.animationDuration=(.6+Math.random()*1.3)+'s';
      dr.style.animationDelay=(Math.random()*.7)+'s';
      dr.style.width=(2+Math.random()*4)+'px';
      dr.style.background=`linear-gradient(rgba(${140+Math.random()*60|0},0,0,1),transparent)`;
      dp.appendChild(dr);
    }
    document.getElementById('ds').classList.add('on');
  }, 3000);
}

window.respawn = function(){
  document.getElementById('ds').classList.remove('on');
  items.forEach(i=>{try{Composite.remove(world,i);}catch(e){}});
  items=[]; fires=[]; particles=[]; shockwaves=[]; dmgTexts=[];
  blX.clearRect(0,0,GW,GH);
  buildDummy();
};

// ─────────────────────────────────────────────
//  COLLISIONS
// ─────────────────────────────────────────────
function setupCollisions(){
  Events.on(engine,'collisionStart', ev=>{
    if(D.dead) return;
    ev.pairs.forEach(pair=>{
      const{bodyA,bodyB}=pair;
      const rp=D.parts;
      const isRA=rp.includes(bodyA)||(D.mode==='stand'&&bodyA===standBox);
      const isRB=rp.includes(bodyB)||(D.mode==='stand'&&bodyB===standBox);
      if(!isRA&&!isRB) return;
      const vitima=isRA?bodyA:bodyB, other=isRA?bodyB:bodyA;
      if(other.label==='wall'||other.label==='standBox') return;
      const spd=Math.max(bodyA.speed,bodyB.speed); if(spd<2) return;
      const impact=spd*(Math.min(other.mass||1,12)+1)*.4; if(impact<2.5) return;
      const dmg=impact*7|0;
      const hitPart=D.mode==='ragdoll'?vitima.label:'torsoU';
      addInj(hitPart, dmg*.45);

      if(D.mode==='stand'){
        const ang=Math.atan2(other.velocity.y,other.velocity.x)+Math.PI;
        D.shake.vx+=Math.cos(ang)*impact*2;
        D.shake.vy+=Math.sin(ang)*impact*2;
        const extras=['head','neck','legUL','legUR','armUL','armUR'];
        addInj(extras[Math.random()*extras.length|0], dmg*.2);
        if(impact>16||totalInj()>1100) switchToRagdoll();
      }

      const{x,y}=vitima.position;
      regHit(dmg);
      const ang2=Math.atan2(vitima.velocity.y||0,vitima.velocity.x||0)+Math.PI;
      bloodSpray(x,y,Math.min(impact*1.2|0,26),impact*.34,ang2);
      if(other.isStatic) bloodSplat(x,y,10+impact);
      if(impact>8){shake(impact/50);hitFlash();}
      if(impact>22){
        const ws=['BRUTAL!','MASSACRE!','SMASH!','GORE!'];
        dmgTexts.push({txt:ws[Math.random()*ws.length|0],x:x+(Math.random()-.5)*28,y:y-16,a:1,vy:2.2,sz:Math.min(13+impact/4.5,30)|0,col:impact>48?'#ffcc00':'#ff2244'});
      }
      if(other.label==='saw'){bloodSpray(x,y,20,10,ang2);addInj(hitPart,55);}
      if(other.label==='spike'){bloodSpray(x,y,16,8,ang2);addInj(hitPart,50);}
      if(other.label==='pellet'){bloodSpray(x,y,10,6,ang2);addInj(hitPart,95);}
      if(other.label==='rocket'&&Composite.allBodies(world).includes(other)) detRocket(other);
      if(other.label==='molotov'&&Composite.allBodies(world).includes(other)) detMolotov(other);
      if(totalInj()>3400&&!D.dead) triggerDeath();
    });
  });

  Events.on(engine,'beforeUpdate',()=>{
    if(comboT>0){comboT--;if(comboT===0)combo=1;}
    Composite.allBodies(world).forEach(b=>{
      if(b.label==='saw')    Body.setAngularVelocity(b, b.angularVelocity*.98+.38);
      if(b.label==='rocket') Body.applyForce(b, b.position, {x:0,y:-.00022});
    });
  });
}

let items=[];

window.spawn=function(type){
  const cx=GW*.2+Math.random()*GW*.6; let it;
  const R=(l,x,y,w,h,o={})=>Bodies.rectangle(x,y,w,h,{label:l,render:{visible:false},...o});
  const C2=(l,x,y,r,o={})=>Bodies.circle(x,y,r,{label:l,render:{visible:false},...o});
  if(type==='anvil') it=R('anvil',cx,-30,Math.min(GW*.18,100),56,{density:.17,restitution:.12,friction:.72});
  else if(type==='saw'){it=C2('saw',cx,-22,Math.min(GW*.08,36),{density:.036,restitution:.44,friction:.01});Body.setAngularVelocity(it,.65);}
  else if(type==='spike') it=C2('spike',cx,-22,Math.min(GW*.06,26),{density:.056,restitution:.5,friction:.1});
  else if(type==='axe'){it=R('axe',cx,-32,44,86,{density:.046,restitution:.24,friction:.5});Body.setAngularVelocity(it,(Math.random()-.5)*.44);}
  else if(type==='bomb'){it=C2('bomb',cx,-25,24,{density:.04,restitution:.5});setTimeout(()=>{if(it&&Composite.allBodies(world).includes(it))detBomb(it);},2500+Math.random()*1500);}
  else if(type==='grenade'){it=C2('grenade',cx,-25,18,{density:.052,restitution:.62});Body.setVelocity(it,{x:(Math.random()-.5)*10,y:-4});setTimeout(()=>{if(it&&Composite.allBodies(world).includes(it))detBomb(it);},3000+Math.random()*800);}
  else if(type==='rocket'){it=R('rocket',cx,-44,20,68,{density:.024,restitution:.1});Body.setVelocity(it,{x:(Math.random()-.5)*2,y:5});setTimeout(()=>{if(it&&Composite.allBodies(world).includes(it))detRocket(it);},4000);}
  else if(type==='molotov'){it=C2('molotov',cx,-25,18,{density:.023,restitution:.44});Body.setVelocity(it,{x:(Math.random()-.5)*7,y:-1});}
  else if(type==='flail'){
    const fh=C2('flail_h',cx,-52,10,{isStatic:true});
    const fb=C2('flail_b',cx+20,-16,26,{density:.056,restitution:.55});
    Composite.add(world,[fh,fb,Constraint.create({bodyA:fh,bodyB:fb,length:100,stiffness:.05,damping:.02,render:{visible:false}})]);
    items.push(fh,fb); Body.setVelocity(fb,{x:11,y:4});
    setTimeout(()=>{[fh,fb].forEach(b=>{try{Composite.remove(world,b);}catch(e){}});items=items.filter(i=>i!==fh&&i!==fb);},7000);
    return;
  }
  if(it){items.push(it);Composite.add(world,it);}
};

window.shotgun=function(){
  const sy=GH*.42; shake(.5); addSW(18,sy,'rgba(255,200,0,.9)');
  for(let i=0;i<12;i++){
    const p=Bodies.circle(22,sy+(Math.random()-.5)*30,5+Math.random()*3,{label:'pellet',density:.0014,restitution:.4,friction:.08,render:{visible:false}});
    Body.setVelocity(p,{x:22+Math.random()*6,y:(Math.random()-.5)*12});
    items.push(p); Composite.add(world,p);
    setTimeout(()=>{try{Composite.remove(world,p);}catch(e){}items=items.filter(i=>i!==p);},1200);
  }
};

function explode(x,y,rad,force,col='rgba(220,60,0,.9)'){
  shake(rad/100); hitFlash();
  for(let i=0;i<3;i++) setTimeout(()=>addSW(x,y,col),i*55);
  for(let i=0;i<28;i++){const a=Math.random()*Math.PI*2,spd=5+Math.random()*15;particles.push({x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,r:Math.random()*5+2,col:i%3===0?'#ffcc00':i%3===1?'#ff6600':'#ff2200',a:1,fade:.024,glow:true});}
  for(let i=0;i<8;i++){const a=Math.random()*Math.PI*2,spd=1+Math.random()*3;particles.push({x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd-2,r:12+Math.random()*16,col:'rgba(18,12,12,.45)',a:.65,fade:.009});}
  bloodSpray(x,y,28,rad/13); bloodSplat(x,y,rad/5);
  if(D.mode==='stand') switchToRagdoll();
  Composite.allBodies(world).forEach(b=>{if(b.isStatic)return;const dx=b.position.x-x,dy=b.position.y-y,dist=Math.hypot(dx,dy);if(dist<rad&&dist>0)Body.applyForce(b,b.position,{x:dx/dist*(1-dist/rad)*force,y:dy/dist*(1-dist/rad)*force});});
}
function detBomb(b){const{x,y}=b.position;try{Composite.remove(world,b);}catch(e){}items=items.filter(i=>i!==b);explode(x,y,310,.0026);dmgTexts.push({txt:'BOOM!',x,y:y-35,a:1,vy:2.2,sz:42,col:'#ffcc00'});}
function detRocket(b){const{x,y}=b.position;try{Composite.remove(world,b);}catch(e){}items=items.filter(i=>i!==b);explode(x,y,280,.0022);}
function detMolotov(b){const{x,y}=b.position;try{Composite.remove(world,b);}catch(e){}items=items.filter(i=>i!==b);for(let i=0;i<6;i++)fires.push({x:x+(Math.random()-.5)*58,y,life:160+Math.random()*100,pts:[]});bloodSpray(x,y,12,5);shake(.5);}

window.blackhole=function(){if(D.mode==='stand')switchToRagdoll();const bh=Bodies.circle(GW/2,GH*.42,44,{label:'bhole',isStatic:true,isSensor:true,render:{visible:false}});items.push(bh);Composite.add(world,bh);shake(1.4);const iv=setInterval(()=>{if(!Composite.allBodies(world).includes(bh)){clearInterval(iv);return;}Composite.allBodies(world).forEach(b=>{if(b.isStatic||b===bh)return;const dx=bh.position.x-b.position.x,dy=bh.position.y-b.position.y,d=Math.hypot(dx,dy);if(d>6)Body.applyForce(b,b.position,{x:dx/d*.0024,y:dy/d*.0024});});},16);setTimeout(()=>{clearInterval(iv);if(Composite.allBodies(world).includes(bh)){explode(bh.position.x,bh.position.y,500,.005,'rgba(180,0,80,.9)');try{Composite.remove(world,bh);}catch(e){}items=items.filter(i=>i!==bh);}},5500);};
window.nuke=function(){explode(GW/2,GH*.44,GW*.9,.009,'rgba(255,220,0,.95)');shake(5);for(let i=0;i<10;i++)setTimeout(()=>addSW(GW*.1+Math.random()*GW*.8,GH*.1+Math.random()*GH*.75,'rgba(255,200,0,.75)'),i*85);dmgTexts.push({txt:'☢ NUCLEAR ☢',x:GW/2,y:GH*.2,a:1,vy:1,sz:Math.min(GW*.12,58),col:'#ffcc00'});};
window.lightning=function(){if(D.mode==='stand')switchToRagdoll();const hb=D.headBody||D.parts[0];if(!hb)return;const tx=hb.position.x,ty=hb.position.y;shake(2);for(let s2=0;s2<6;s2++)setTimeout(()=>particles.push({x:tx+(Math.random()-.5)*12,y:0,vx:(Math.random()-.5)*1.5,vy:22+Math.random()*9,r:3.5,col:'rgba(180,215,255,.95)',a:1,fade:.04,glow:true}),s2*16);setTimeout(()=>{addSW(tx,ty,'rgba(180,215,255,.95)');bloodSpray(tx,ty,20,9);explode(tx,ty,190,.0015,'rgba(180,215,255,.9)');dmgTexts.push({txt:'ZAP!',x:tx,y:ty-26,a:1,vy:2.3,sz:34,col:'#aaddff'});},85);};
window.ragepunch=function(){if(D.mode==='stand')switchToRagdoll();D.parts.forEach(b=>Body.applyForce(b,b.position,{x:(Math.random()-.5)*.09,y:-.09-Math.random()*.07}));bloodSpray(GW/2,GH*.4,28,14);shake(2);dmgTexts.push({txt:'RAGE PUNCH!',x:GW/2,y:GH*.26,a:1,vy:1.8,sz:Math.min(GW*.1,44),col:'#ff2244'});};
window.gravcrush=function(){if(D.mode==='stand')switchToRagdoll();D.parts.forEach(b=>Body.applyForce(b,b.position,{x:0,y:.2}));shake(1.4);dmgTexts.push({txt:'CRUSHED!',x:GW/2,y:GH*.48,a:1,vy:1.4,sz:40,col:'#ff4400'});};

// ─────────────────────────────────────────────
//  MODE / TOUCH INTERACTION
// ─────────────────────────────────────────────
let mouseMode='drag';
window.setMode=function(m){
  mouseMode=m;
  ['drag','rep','mag','sli'].forEach(id=>document.getElementById('mp-'+id)?.classList.toggle('on',id===m));
  if(mcRef) mcRef.constraint.stiffness = m==='drag' ? .22 : .00001;
};

function handlePoke(x,y){
  if(D.dead) return;
  if(mouseMode==='rep'){
    addSW(x,y,'rgba(255,100,0,.9)');shake(.5);if(D.mode==='stand')switchToRagdoll();
    Composite.allBodies(world).forEach(b=>{if(b.isStatic)return;const dx=b.position.x-x,dy=b.position.y-y,d=Math.hypot(dx,dy);if(d<240&&d>0)Body.applyForce(b,b.position,{x:dx/d*(1-d/240)*.006,y:dy/d*(1-d/240)*.006});});
    bloodSpray(x,y,9,5);
  } else if(mouseMode==='mag'){
    addSW(x,y,'rgba(50,200,100,.7)');shake(.35);if(D.mode==='stand')switchToRagdoll();
    Composite.allBodies(world).forEach(b=>{if(b.isStatic)return;const dx=b.position.x-x,dy=b.position.y-y,d=Math.hypot(dx,dy);if(d<300&&d>0)Body.applyForce(b,b.position,{x:-dx/d*(1-d/300)*.005,y:-dy/d*(1-d/300)*.005});});
  } else if(mouseMode==='sli'){
    addSW(x,y,'rgba(255,255,255,.8)');shake(.7);
    if(D.mode==='stand'){D.shake.vx+=(Math.random()-.5)*20;D.shake.vy-=14;addInj('torsoU',68);addInj('head',30);bloodSpray(x,y,14,8);switchToRagdoll();}
    else{D.parts.forEach(b=>{const d=Math.hypot(b.position.x-x,b.position.y-y);if(d<140){Body.applyForce(b,b.position,{x:(Math.random()-.5)*.03,y:-.05});addInj(b.label,72);bloodSpray(b.position.x,b.position.y,14,8);}});}
    dmgTexts.push({txt:'SLICE!',x,y:y-10,a:1,vy:2.3,sz:30,col:'#fff'});
  }
  if(['rep','mag','sli'].includes(mouseMode)){
    const p2=['head','torsoU','torsoL','legUL','legUR'];
    addInj(p2[Math.random()*p2.length|0],40);
    regHit(72);
    if(totalInj()>3400&&!D.dead) triggerDeath();
  }
}

const tlEl=document.getElementById('tl');
tlEl.addEventListener('touchstart',e=>{e.preventDefault();if(mouseMode!=='drag'){const t=e.changedTouches[0],r=tlEl.getBoundingClientRect();handlePoke(t.clientX-r.left,t.clientY-r.top);}},{passive:false});
tlEl.addEventListener('mousedown',e=>{if(mouseMode!=='drag'){const r=tlEl.getBoundingClientRect();handlePoke(e.clientX-r.left,e.clientY-r.top);}});

// ─────────────────────────────────────────────
//  DRAG via Mouse Constraint
// ─────────────────────────────────────────────
function setupDrag(){
  const gc=document.getElementById('gc');
  const mouse=Mouse.create(gc);
  gc.addEventListener('touchstart',e=>{if(mouseMode!=='drag')return;e.preventDefault();const t=e.touches[0],r=gc.getBoundingClientRect();mouse.position.x=t.clientX-r.left;mouse.position.y=t.clientY-r.top;mouse.button=0;},{passive:false});
  gc.addEventListener('touchmove',e=>{if(mouseMode!=='drag')return;e.preventDefault();const t=e.touches[0],r=gc.getBoundingClientRect();mouse.position.x=t.clientX-r.left;mouse.position.y=t.clientY-r.top;},{passive:false});
  gc.addEventListener('touchend',e=>{if(mouseMode!=='drag')return;mouse.button=-1;},{passive:false});
  mcRef=MouseConstraint.create(engine,{mouse,constraint:{stiffness:.22,render:{visible:false}}});
  Composite.add(world,mcRef);
}

};
window.showCat = function(cat){
  document.querySelectorAll('.cat').forEach((el,i)=>el.classList.toggle('on',['weapons','powers','tools'][i]===cat));
  const tray=document.getElementById('tray'); tray.innerHTML='';
  catDefs[cat].forEach(d=>{
    const btn=document.createElement('button'); btn.className='wb '+(d.cls||'');
    btn.innerHTML=`<span class="ic">${d.ic}</span>${d.label}`;
    btn.addEventListener('touchstart',e=>{e.preventDefault();d.fn();},{passive:false});
    btn.addEventListener('click',d.fn);
    tray.appendChild(btn);
  });
};

// ─────────────────────────────────────────────
//  WEAPON DRAWING
// ─────────────────────────────────────────────
function drawWeapons(){
  Composite.allBodies(world).forEach(b=>{
    if(b.isStatic||b===standBox||D.parts.includes(b)) return;
    const ctx=ovX, lbl=b.label;
    const pw=b.bounds.max.x-b.bounds.min.x, ph=b.bounds.max.y-b.bounds.min.y;
    ctx.save(); ctx.translate(b.position.x,b.position.y); ctx.rotate(b.angle);
    if(lbl==='anvil'){ctx.shadowColor='rgba(0,0,0,.9)';ctx.shadowBlur=12;const mg=ctx.createLinearGradient(-pw/2,-ph/2,pw/2,ph/2);mg.addColorStop(0,'#3a4a50');mg.addColorStop(.5,'#263640');mg.addColorStop(1,'#162630');ctx.fillStyle=mg;rr(ctx,-pw/2,-ph/2,pw,ph,6);ctx.fill();ctx.fillStyle='#4a5a62';rr(ctx,-pw*.32,-ph/2,pw*.64,ph*.28,4);ctx.fill();}
    else if(lbl==='saw'){const spin=Date.now()*.025;ctx.shadowColor='rgba(200,20,20,.7)';ctx.shadowBlur=16;ctx.save();ctx.rotate(spin);for(let i=0;i<20;i++){ctx.rotate(Math.PI*.1);ctx.fillStyle=i%2===0?'#cc1122':'#881122';ctx.beginPath();ctx.moveTo(-3,-pw*.44);ctx.lineTo(3,-pw*.44);ctx.lineTo(0,-pw*.6);ctx.closePath();ctx.fill();}ctx.restore();const dg=ctx.createRadialGradient(0,0,3,0,0,pw*.44);dg.addColorStop(0,'#3a3a3a');dg.addColorStop(1,'#111');ctx.fillStyle=dg;ctx.beginPath();ctx.arc(0,0,pw*.44,0,Math.PI*2);ctx.fill();ctx.fillStyle='#cc1122';ctx.beginPath();ctx.arc(0,0,pw*.08,0,Math.PI*2);ctx.fill();}
    else if(lbl==='spike'){ctx.shadowColor='rgba(80,0,0,.8)';ctx.shadowBlur=13;const bg=ctx.createRadialGradient(-pw*.18,-pw*.18,pw*.05,0,0,pw*.42);bg.addColorStop(0,'#3a2828');bg.addColorStop(1,'#0d0808');ctx.fillStyle=bg;ctx.beginPath();ctx.arc(0,0,pw*.42,0,Math.PI*2);ctx.fill();for(let i=0;i<14;i++){ctx.save();ctx.rotate(Math.PI*2/14*i);ctx.fillStyle=i%2===0?'#772233':'#aa2244';ctx.beginPath();ctx.moveTo(-2.5,-pw*.34);ctx.lineTo(2.5,-pw*.34);ctx.lineTo(0,-pw*.66);ctx.closePath();ctx.fill();ctx.restore();}}
    else if(lbl==='axe'){ctx.shadowColor='rgba(0,0,0,.8)';ctx.shadowBlur=10;const hg=ctx.createLinearGradient(-pw*.08,-ph*.3,pw*.08,ph*.44);hg.addColorStop(0,'#5a3010');hg.addColorStop(.5,'#3a1e08');hg.addColorStop(1,'#5a3010');ctx.fillStyle=hg;rr(ctx,-pw*.08,-ph*.3,pw*.16,ph*.78,4);ctx.fill();const ag=ctx.createLinearGradient(-pw*.5,-ph*.35,pw*.5,ph*.1);ag.addColorStop(0,'#5e5e70');ag.addColorStop(.5,'#3e3e50');ag.addColorStop(1,'#2a2a3c');ctx.fillStyle=ag;ctx.beginPath();ctx.moveTo(-pw*.08,-ph*.3);ctx.bezierCurveTo(-pw*.5,-ph*.52,pw*.55,-ph*.62,pw*.5,-ph*.1);ctx.bezierCurveTo(pw*.45,ph*.1,pw*.1,ph*.04,pw*.08,0);ctx.closePath();ctx.fill();}
    else if(lbl==='bomb'){const pulse=.5+.5*Math.sin(Date.now()*.013);ctx.shadowColor=`rgba(255,${60+pulse*120|0},0,${.5+pulse*.5})`;ctx.shadowBlur=14+pulse*14;const bg=ctx.createRadialGradient(-pw*.18,-pw*.18,pw*.05,0,0,pw*.44);bg.addColorStop(0,'#2a2a2a');bg.addColorStop(1,'#0a0a0a');ctx.fillStyle=bg;ctx.beginPath();ctx.arc(0,0,pw*.44,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#996600';ctx.lineWidth=3;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(0,-pw*.44);ctx.quadraticCurveTo(pw*.25,-pw*.72,pw*.1,-pw*.9);ctx.stroke();ctx.fillStyle=`rgba(255,${180+pulse*75|0},0,.9)`;ctx.shadowColor='#ffaa00';ctx.shadowBlur=10;ctx.beginPath();ctx.arc(pw*.1,-pw*.9,3+pulse*3,0,Math.PI*2);ctx.fill();}
    else if(lbl==='grenade'){ctx.fillStyle='#2a4a1a';rr(ctx,-pw*.3,-ph*.4,pw*.6,ph*.7,pw*.25);ctx.fill();ctx.fillStyle='#888';ctx.fillRect(-pw*.35,-ph*.42,pw*.7,ph*.06);}
    else if(lbl==='rocket'){const rog=ctx.createLinearGradient(-pw*.5,0,pw*.5,0);rog.addColorStop(0,'#224488');rog.addColorStop(.5,'#3366aa');rog.addColorStop(1,'#224488');ctx.fillStyle=rog;rr(ctx,-pw*.44,-ph*.38,pw*.88,ph*.65,pw*.34);ctx.fill();ctx.fillStyle='#cc2211';ctx.beginPath();ctx.moveTo(-pw*.44,-ph*.38);ctx.lineTo(pw*.44,-ph*.38);ctx.lineTo(0,-ph*.74);ctx.closePath();ctx.fill();const fl=ctx.createRadialGradient(0,ph*.28,0,0,ph*.52,pw*.38);fl.addColorStop(0,'rgba(255,230,0,.95)');fl.addColorStop(.4,'rgba(255,80,0,.7)');fl.addColorStop(1,'rgba(200,0,0,0)');ctx.fillStyle=fl;ctx.beginPath();ctx.ellipse(0,ph*.35,pw*.27,ph*.27,0,0,Math.PI*2);ctx.fill();}
    else if(lbl==='molotov'){ctx.fillStyle='#2a4a1a';rr(ctx,-pw*.22,-ph*.35,pw*.44,ph*.65,pw*.2);ctx.fill();const wf=.5+.5*Math.sin(Date.now()*.016);ctx.fillStyle=`rgba(255,${200+wf*55|0},0,.9)`;ctx.shadowColor='#ffaa00';ctx.shadowBlur=7;ctx.beginPath();ctx.arc(0,-ph*.52,3+wf*2.5,0,Math.PI*2);ctx.fill();}
    else if(lbl==='flail_b'){const bg=ctx.createRadialGradient(-pw*.14,-pw*.14,pw*.05,0,0,pw*.42);bg.addColorStop(0,'#3a2828');bg.addColorStop(1,'#0d0808');ctx.fillStyle=bg;ctx.beginPath();ctx.arc(0,0,pw*.42,0,Math.PI*2);ctx.fill();for(let i=0;i<12;i++){ctx.save();ctx.rotate(Math.PI*2/12*i);ctx.fillStyle='#661122';ctx.beginPath();ctx.moveTo(-2,-pw*.34);ctx.lineTo(2,-pw*.34);ctx.lineTo(0,-pw*.55);ctx.closePath();ctx.fill();ctx.restore();}}
    else if(lbl==='pellet'){ctx.fillStyle='#ddaa33';ctx.beginPath();ctx.arc(0,0,b.circleRadius||4,0,Math.PI*2);ctx.fill();}
    else if(lbl==='bhole'){const t=Date.now()*.0015;for(let ring=4;ring>=0;ring--){const rad2=pw*.52+ring*pw*.2;ctx.save();ctx.rotate(t*(1+ring*.12));ctx.strokeStyle=`rgba(${140+ring*15|0},0,${ring*25|0},${.09-ring*.014})`;ctx.lineWidth=6;ctx.beginPath();ctx.ellipse(0,0,rad2,rad2*.28,0,0,Math.PI*2);ctx.stroke();ctx.restore();}const vg=ctx.createRadialGradient(0,0,0,0,0,pw*.56);vg.addColorStop(0,'#000');vg.addColorStop(.65,'#040004');vg.addColorStop(1,'rgba(50,0,25,0)');ctx.fillStyle=vg;ctx.shadowColor='#ff0066';ctx.shadowBlur=44;ctx.beginPath();ctx.arc(0,0,pw*.56,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;}
    ctx.restore();
  });
}

// ─────────────────────────────────────────────
//  MAIN GAME LOOP
// ─────────────────────────────────────────────
function gameLoop(){
  requestAnimationFrame(gameLoop);

  // Standing shake update
  if(D.mode==='stand'&&!D.dead){
    D.shake.vx *= .74; D.shake.vy *= .74;
    D.shake.x = D.shake.vx * 1.4;
    D.shake.y = D.shake.vy * 1.4;
    const r = 22*D.sc;
    D.eyeX += (D.shake.vx*.04 - D.eyeX)*.14;
    D.eyeY += (D.shake.vy*.04 - D.eyeY)*.14;
    D.eyeX = Math.max(-r*.07, Math.min(r*.07, D.eyeX));
    D.eyeY = Math.max(-r*.06, Math.min(r*.06, D.eyeY));
  }

  gcX.clearRect(0,0,GW,GH);
  ovX.clearRect(0,0,GW,GH);

  if(D.mode==='stand'&&!D.dead) drawStanding(gcX);
  else D.parts.forEach(p=>drawRagPart(gcX,p));

  drawWeapons();

  // Fire
  for(let i=fires.length-1;i>=0;i--){
    const f=fires[i];
    for(let j=f.pts.length-1;j>=0;j--){
      const fp=f.pts[j];
      ovX.save(); ovX.globalAlpha=fp.a*.8;
      const fg=ovX.createRadialGradient(fp.x,fp.y,0,fp.x,fp.y,fp.r);
      fg.addColorStop(0,'rgba(255,220,0,1)');fg.addColorStop(.35,'rgba(255,80,0,.88)');fg.addColorStop(1,'rgba(200,0,0,0)');
      ovX.fillStyle=fg;ovX.beginPath();ovX.arc(fp.x,fp.y,fp.r,0,Math.PI*2);ovX.fill();ovX.restore();
      fp.x+=(Math.random()-.5)*2.2;fp.y-=2+Math.random()*1.6;fp.r*=.93;fp.a-=.02;
      if(fp.a<=0||fp.r<.3)f.pts.splice(j,1);
    }
    if(f.life>0&&f.pts.length<50)for(let k=0;k<3;k++)f.pts.push({x:f.x+(Math.random()-.5)*18,y:f.y+5,r:8+Math.random()*10,a:.6+Math.random()*.3});
    f.life--;if(f.life<=0&&f.pts.length===0)fires.splice(i,1);
  }

  // Shockwaves
  for(let i=shockwaves.length-1;i>=0;i--){
    const sw=shockwaves[i];
    ovX.save();ovX.globalAlpha=sw.a;ovX.strokeStyle=sw.col;ovX.lineWidth=8*sw.a;
    ovX.beginPath();ovX.arc(sw.x,sw.y,sw.r,0,Math.PI*2);ovX.stroke();ovX.restore();
    sw.r+=19;sw.a-=.032;if(sw.a<=0)shockwaves.splice(i,1);
  }

  // Particles
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    ovX.save();ovX.globalAlpha=p.a;ovX.fillStyle=p.col;
    if(p.glow){ovX.shadowColor=p.col;ovX.shadowBlur=9;}
    ovX.beginPath();ovX.arc(p.x,p.y,p.r,0,Math.PI*2);ovX.fill();ovX.restore();
    p.x+=p.vx;p.y+=p.vy;p.vy+=.32;p.vx*=.98;p.a-=p.fade;p.r*=.974;
    if(p.a<=0||p.r<.2)particles.splice(i,1);
  }

  // Damage texts
  for(let i=dmgTexts.length-1;i>=0;i--){
    const t=dmgTexts[i];
    ovX.save();ovX.globalAlpha=t.a;ovX.font=`900 ${t.sz||20}px Bebas Neue`;ovX.textAlign='center';
    ovX.strokeStyle='rgba(0,0,0,.92)';ovX.lineWidth=4;ovX.strokeText(t.txt,t.x,t.y);
    ovX.fillStyle=t.col||'#ff2244';ovX.fillText(t.txt,t.x,t.y);ovX.restore();
    t.y-=t.vy||2;t.a-=.015;if(t.a<=0)dmgTexts.splice(i,1);
  }
}
